<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="centerGrad" x1="20%" y1="20%" x2="80%" y2="80%">
      <stop offset="0%" stop-color="#6db3ff"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Outer signal ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#4a9eff" stroke-width="1" opacity="0.12"/>
  <circle cx="50" cy="50" r="30" fill="none" stroke="#4a9eff" stroke-width="1.2" opacity="0.2"/>

  <!-- Mesh edges: center to outer nodes -->
  <g stroke="#4a9eff" stroke-width="1.8" opacity="0.45" stroke-linecap="round">
    <line x1="50" y1="50" x2="80" y2="50"/>
    <line x1="50" y1="50" x2="65" y2="76"/>
    <line x1="50" y1="50" x2="35" y2="76"/>
    <line x1="50" y1="50" x2="20" y2="50"/>
    <line x1="50" y1="50" x2="35" y2="24"/>
    <line x1="50" y1="50" x2="65" y2="24"/>
  </g>

  <!-- Mesh edges: outer ring -->
  <g stroke="#4a9eff" stroke-width="1.2" opacity="0.28" stroke-linecap="round">
    <line x1="80" y1="50" x2="65" y2="76"/>
    <line x1="65" y1="76" x2="35" y2="76"/>
    <line x1="35" y1="76" x2="20" y2="50"/>
    <line x1="20" y1="50" x2="35" y2="24"/>
    <line x1="35" y1="24" x2="65" y2="24"/>
    <line x1="65" y1="24" x2="80" y2="50"/>
  </g>

  <!-- Outer mesh nodes -->
  <g fill="#4a9eff">
    <circle cx="80" cy="50" r="4.5" opacity="0.75"/>
    <circle cx="65" cy="76" r="4.5" opacity="0.75"/>
    <circle cx="35" cy="76" r="4.5" opacity="0.75"/>
    <circle cx="20" cy="50" r="4.5" opacity="0.75"/>
    <circle cx="35" cy="24" r="4.5" opacity="0.75"/>
    <circle cx="65" cy="24" r="4.5" opacity="0.75"/>
  </g>

  <!-- Center gateway node -->
  <circle cx="50" cy="50" r="14" fill="url(#centerGrad)"/>
  <circle cx="50" cy="50" r="6" fill="white" opacity="0.95"/>
</svg>
