<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Glow behind main node -->
  <circle cx="20" cy="14" r="8" fill="rgba(74,158,255,0.12)"/>
  <!-- Mesh connection lines -->
  <g stroke="#4a9eff" stroke-width="1.2" opacity="0.45" stroke-linecap="round">
    <line x1="8" y1="28" x2="20" y2="14"/>
    <line x1="20" y1="14" x2="32" y2="22"/>
    <line x1="8" y1="28" x2="20" y2="32"/>
    <line x1="20" y1="32" x2="32" y2="22"/>
    <line x1="20" y1="14" x2="20" y2="32"/>
    <line x1="8" y1="28" x2="32" y2="22"/>
  </g>
  <!-- Signal arcs -->
  <g fill="none" stroke="#4a9eff" stroke-linecap="round" opacity="0.95">
    <path d="M13 8 Q20 3 27 8" stroke-width="1.6"/>
    <path d="M16.5 11 Q20 8.5 23.5 11" stroke-width="1.4"/>
  </g>
  <!-- Secondary nodes -->
  <circle cx="8"  cy="28" r="2.4" fill="#6db3ff" opacity="0.85"/>
  <circle cx="32" cy="22" r="2.4" fill="#6db3ff" opacity="0.85"/>
  <circle cx="20" cy="32" r="2.4" fill="#6db3ff" opacity="0.85"/>
  <!-- Main node -->
  <circle cx="20" cy="14" r="3.4" fill="#4a9eff"/>
  <circle cx="20" cy="14" r="1.6" fill="#fff" opacity="0.9"/>
</svg>
